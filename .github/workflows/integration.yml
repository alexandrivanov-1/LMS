name: Integration (Compose)

on:
  pull_request:
  workflow_dispatch:

jobs:
  compose-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=kpk
          POSTGRES_USER=kpk
          POSTGRES_PASSWORD=changeme
          MINIO_ACCESS_KEY=kpk_access
          MINIO_SECRET_KEY=changeme
          NEO4J_USER=neo4j
          NEO4J_PASS=changeme
          VECTOR_DIM=768
          EOF

      - name: Build & Up
        working-directory: infra
        run: docker compose up -d --build

      - name: Wait for gateway
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost/health && exit 0 || true
            sleep 5
          done
          echo "gateway didn't respond"; docker compose -f infra/docker-compose.yml ps; exit 1

      - name: Seed baseline norm unit
        run: |
          docker compose -f infra/docker-compose.yml exec -T postgres \
            psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
            -c "INSERT INTO norm_unit (id, law, law_title, article, valid_from) VALUES ('00000000-0000-0000-0000-000000000001','Тестовый закон','Тестовый закон','1','2020-01-01') ON CONFLICT (id) DO NOTHING;"

      - name: Smoke scenario
        run: |
          python - <<'PY'
import json
import os
import subprocess
import sys
import tempfile
import time
import uuid

subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'requests', 'openpyxl'])

import requests  # noqa: E402
from openpyxl import Workbook  # noqa: E402

BASE = 'http://localhost'

def expect(resp: requests.Response):
    resp.raise_for_status()
    return resp

files = {'files': ('test.txt', b'hello stage 1 smoke', 'text/plain')}
expect(requests.post(f'{BASE}/ingest/upload', files=files))
expect(requests.post(f'{BASE}/parser/scan'))
expect(requests.post(f'{BASE}/indexer/run'))

atom_id = f'smoke-atom-{uuid.uuid4().hex[:8]}'
atom_payload = {
    'id': atom_id,
    'title': 'Smoke atom',
    'statement': 'Тестовое утверждение',
    'type': 'declarative',
    'bloom': 'remember',
    'granularity': 'micro',
    'prerequisites': [],
    'misconceptions': [],
    'citations': [],
}
expect(requests.post(f'{BASE}/atoms', json=atom_payload))

context_id = f'smoke-context-{uuid.uuid4().hex[:8]}'
context_payload = {
    'id': context_id,
    'title': 'Smoke context',
    'description': 'autogenerated',
    'type': 'declarative',
    'bloom': 'remember',
    'granularity': 'micro',
    'atom_ids': [atom_id],
    'prerequisites': [],
    'misconceptions': [],
    'citations': [],
}
expect(requests.post(f'{BASE}/contexts', json=context_payload))

workbook = Workbook()
sheet = workbook.active
sheet.append(['prompt', 'option1', 'option2', 'option3', 'option4', 'correct', 'norm_unit_id'])
sheet.append(['Smoke question', 'A', 'B', 'C', 'D', 1, '00000000-0000-0000-0000-000000000001'])
tmp = tempfile.NamedTemporaryFile(delete=False, suffix='.xlsx')
workbook.save(tmp.name)
with open(tmp.name, 'rb') as handle:
    files = {'file': ('mcq.xlsx', handle, 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet')}
    expect(requests.post(f'{BASE}/questions/import_xlsx', files=files))

search_resp = expect(requests.post(
    f'{BASE}/search',
    json={'query': 'smoke', 'as_of': '2024-01-01', 'top_k': 3},
)).json()

items = search_resp.get('items') or []
if not items:
    raise RuntimeError('search returned no items')
chunk_id = items[0]['chunk_id']
expect(requests.get(f'{BASE}/graph', params={'node_id': chunk_id, 'depth': 2}))

cards_resp = expect(requests.get(f'{BASE}/cards/export/anki'))
if not cards_resp.content:
    raise RuntimeError('anki export is empty')
PY

      - name: Logs (artifact)
        if: always()
        run: |
          docker compose -f infra/docker-compose.yml logs --no-color > compose.log || true
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compose-logs
          path: compose.log
