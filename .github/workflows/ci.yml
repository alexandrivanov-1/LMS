name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python services (lint+tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, ingest, parser, indexer, mask, search]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff black pytest
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (black)
        run: black --check .
      - name: Tests
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          root = Path('.')

          def has_tests() -> bool:
              tests_dir = root / 'tests'
              if tests_dir.exists() and any(tests_dir.rglob('*.py')):
                  return True
              if any(root.glob('test_*.py')):
                  return True
              for child in root.iterdir():
                  if child.is_dir() and any(child.glob('test_*.py')):
                      return True
              return False

          if has_tests():
              sys.exit(subprocess.call(['pytest', '-q']))
          else:
              print('No tests detected; skipping pytest')
          PY

  node:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: if [ -f package.json ]; then npm ci; fi
      - run: if [ -f package.json ]; then npm run lint; fi
      - run: if [ -f package.json ]; then npm run build; fi

  docker:
    name: Build & Push Docker images
    needs: [python, node]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push services
        run: |
          REPO=ghcr.io/${{ github.repository }}
          docker build -t $REPO/gateway:latest services/gateway
          docker build -t $REPO/ingest:latest services/ingest
          docker build -t $REPO/parser:latest services/parser
          docker build -t $REPO/indexer:latest services/indexer
          docker build -t $REPO/mask:latest services/mask
          docker build -t $REPO/search:latest services/search
          docker build -t $REPO/frontend:latest frontend
          docker push $REPO/gateway:latest
          docker push $REPO/ingest:latest
          docker push $REPO/parser:latest
          docker push $REPO/indexer:latest
          docker push $REPO/mask:latest
          docker push $REPO/search:latest
          docker push $REPO/frontend:latest
