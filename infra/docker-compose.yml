version: "3.8"

x-env: &default-env
  ENV: production
  TZ: Europe/Moscow

services:
  nginx:
    image: nginx:alpine
    depends_on: [frontend, gateway]
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/www:/var/www/html
    networks: [kpknet]
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [kpknet]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio-data:/data
    networks: [kpknet]
    restart: unless-stopped

  minio-mc:
    image: minio/mc
    depends_on: [minio]
    entrypoint: ["/bin/sh", "-c"]
    command: |
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} && \
      mc mb -p local/sources || true
    networks: [kpknet]
    restart: "no"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks: [kpknet]
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    ports: ["6333:6333"]
    networks: [kpknet]
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASS}
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_heap_initial__size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    ports: ["7474:7474", "7687:7687"]
    networks: [kpknet]
    restart: unless-stopped

  tika:
    image: apache/tika:2.9.0-full
    ports: ["9998:9998"]
    networks: [kpknet]
    restart: unless-stopped

  piper:
    image: rhasspy/wyoming-piper:latest
    profiles: [tts]
    command: ["--server", "--host", "0.0.0.0", "--port", "10200"]
    ports: ["10200:10200"]
    volumes:
      - ./piper/voices:/usr/share/piper/voices
    networks: [kpknet]
    restart: unless-stopped

  gateway:
    build: ../services/gateway
    environment:
      <<: *default-env
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASS: ${NEO4J_PASS}
      REDIS_URL: redis://redis:6379/0
      TIKA_URL: http://tika:9998
      PIPER_URL: http://piper:10200
      PARSER_URL: http://parser:8000
      INDEXER_URL: http://indexer:8000
      SEARCH_URL: http://search:8000
    depends_on: [postgres, minio, qdrant, neo4j, redis, tika, piper]
    networks: [kpknet]
    restart: unless-stopped

  ingest:
    build: ../services/ingest
    environment:
      <<: *default-env
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: sources
    depends_on: [redis, minio]
    networks: [kpknet]
    restart: unless-stopped

  parser:
    build: ../services/parser
    environment:
      <<: *default-env
      TIKA_URL: http://tika:9998
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: sources
    depends_on: [tika, postgres]
    networks: [kpknet]
    restart: unless-stopped

  indexer:
    build: ../services/indexer
    environment:
      <<: *default-env
      QDRANT_URL: http://qdrant:6333
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VECTOR_DIM: ${VECTOR_DIM:-768}
    depends_on: [qdrant, postgres]
    networks: [kpknet]
    restart: unless-stopped

  search:
    build: ../services/search
    environment:
      <<: *default-env
      QDRANT_URL: http://qdrant:6333
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on: [qdrant, postgres]
    networks: [kpknet]
    restart: unless-stopped

  mask:
    build: ../services/mask
    environment:
      <<: *default-env
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASS: ${NEO4J_PASS}
    depends_on: [postgres, neo4j]
    networks: [kpknet]
    restart: unless-stopped

  frontend:
    build: ../frontend
    networks: [kpknet]
    restart: unless-stopped
    command: ["sh","-c","echo Frontend placeholder running; tail -f /dev/null"]

volumes:
  pgdata:
  minio-data:
  redis-data:
  qdrant-data:
  neo4j-data:
  neo4j-logs:

networks:
  kpknet:
    driver: bridge
