<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>KPK Stage 1 — демо</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    body{font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:2rem; line-height:1.5}
    .card{border:1px solid #ddd; border-radius:12px; padding:16px; margin-bottom:16px}
    button{padding:8px 14px; border-radius:8px; border:1px solid #ccc; background:#f8f8f8; cursor:pointer}
    input[type=file]{margin:8px 0}
    pre{background:#f5f5f5; padding:12px; border-radius:8px; overflow:auto}
  </style>
</head>
<body>
  <h1>KPK Stage 1 — демо</h1>

  <div class="card">
    <h3>1) Загрузка файла</h3>
    <form id="uploadForm">
      <input type="file" name="files" multiple required />
      <br><button type="submit">Загрузить</button>
    </form>
    <pre id="uploadOut"></pre>
  </div>

  <div class="card">
    <h3>2) Парсер (Tika → chunk)</h3>
    <button id="scanBtn">Сканировать (parser/scan)</button>
    <pre id="scanOut"></pre>
  </div>

  <div class="card">
    <h3>3) Индексация (Qdrant)</h3>
    <button id="indexBtn">Индексировать (indexer/run)</button>
    <pre id="indexOut"></pre>
  </div>

  <div class="card">
    <h3>4) Поиск</h3>
    <input id="q" placeholder="запрос" style="width:60%"/>
    <button id="searchBtn">Искать</button>
    <pre id="searchOut"></pre>
  </div>

<script>
const $ = sel => document.querySelector(sel);

$('#uploadForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const fd = new FormData($('#uploadForm'));
  const r = await fetch('/ingest/upload', { method:'POST', body:fd });
  $('#uploadOut').textContent = JSON.stringify(await r.json(), null, 2);
});

$('#scanBtn').addEventListener('click', async ()=>{
  const r = await fetch('/parser/scan', { method:'POST' });
  $('#scanOut').textContent = JSON.stringify(await r.json(), null, 2);
});

$('#indexBtn').addEventListener('click', async ()=>{
  const r = await fetch('/indexer/run', { method:'POST' });
  $('#indexOut').textContent = JSON.stringify(await r.json(), null, 2);
});

$('#searchBtn').addEventListener('click', async ()=>{
  const q = $('#q').value || '';
  const r = await fetch('/search', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ query:q, top_k:5 })
  });
  $('#searchOut').textContent = JSON.stringify(await r.json(), null, 2);
});
</script>
</body>
</html>
